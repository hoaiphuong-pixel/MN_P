<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Bucket List 🧭</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, serif;
    background: #f9f6f1;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px 60px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    max-width: 620px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    overflow: hidden;
    border: 1px solid #ede8e0;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #2c3e50 0%, #3d5a80 100%);
    padding: 32px 36px 26px;
    color: #fff;
  }
  .header-top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .compass { font-size: 38px; }
  .title { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .subtitle { font-size: 11px; opacity: 0.5; margin-top: 4px; font-family: sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .progress-label { font-family: sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; width: 16px; }
  .progress-label.m { color: #7ec8e3; }
  .progress-label.p { color: #f4a261; }
  .progress-track { flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .progress-fill.m { background: #7ec8e3; }
  .progress-fill.p { background: #f4a261; }
  .progress-count { font-family: sans-serif; font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
  .progress-count.m { color: #7ec8e3; }
  .progress-count.p { color: #f4a261; }

  /* COLUMN HEADERS */
  .col-headers { display: flex; align-items: center; padding: 10px 36px 6px; border-bottom: 1px solid #f0ece5; }
  .col-headers .spacer { flex: 1; }
  .col-head { width: 52px; text-align: center; font-family: sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .col-head.m { color: #3d5a80; }
  .col-head.p { color: #e07b39; }
  .col-head.del { width: 36px; }

  /* LIST ITEMS */
  .item {
    display: flex;
    align-items: center;
    padding: 12px 36px;
    border-bottom: 1px solid #f5f0ea;
    background: #fff;
    transition: background 0.2s;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .item:last-child { border-bottom: none; }
  .item.both-done { background: #f5fff8; }

  .item-icon { font-size: 20px; margin-right: 12px; flex-shrink: 0; }
  .item-label { flex: 1; font-size: 14px; color: #333; }
  .item.both-done .item-label { color: #999; }

  .check-col { width: 52px; display: flex; justify-content: center; }
  .checkbox {
    width: 24px; height: 24px; border-radius: 7px; border: 2px solid #ddd;
    background: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; font-weight: 700;
    transition: all 0.2s; user-select: none;
  }
  .checkbox:hover { transform: scale(1.12); }
  .checkbox.m-box.checked { border-color: #3d5a80; background: #e8f0f9; color: #3d5a80; box-shadow: 0 2px 8px #3d5a8033; transform: scale(1.1); }
  .checkbox.p-box.checked { border-color: #e07b39; background: #fef0e6; color: #e07b39; box-shadow: 0 2px 8px #e07b3933; transform: scale(1.1); }

  .del-col { width: 36px; display: flex; justify-content: center; }
  .del-btn {
    width: 22px; height: 22px; border-radius: 50%; border: none;
    background: none; color: #ddd; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; line-height: 1; padding-bottom: 1px;
  }
  .del-btn:hover { background: #fee; color: #e05555; }

  /* ADD ITEM FORM */
  .add-section {
    padding: 16px 36px;
    border-top: 2px dashed #ede8e0;
    background: #fdfcfa;
  }
  .add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .emoji-picker-wrap { position: relative; }
  .emoji-btn {
    width: 42px; height: 42px; border-radius: 10px; border: 1.5px solid #e0dbd3;
    background: #fff; font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .emoji-btn:hover { border-color: #3d5a80; }

  .emoji-grid {
    display: none;
    position: absolute;
    bottom: 48px; left: 0;
    background: #fff;
    border: 1px solid #ede8e0;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    width: 230px;
    flex-wrap: wrap;
    gap: 2px;
    z-index: 100;
  }
  .emoji-grid.open { display: flex; }
  .emoji-opt {
    font-size: 20px; cursor: pointer; padding: 4px 5px; border-radius: 6px;
    transition: background 0.15s;
  }
  .emoji-opt:hover { background: #f0f0f0; }

  .add-input {
    flex: 1;
    min-width: 160px;
    height: 42px;
    border: 1.5px solid #e0dbd3;
    border-radius: 10px;
    padding: 0 14px;
    font-size: 14px;
    font-family: Georgia, serif;
    color: #333;
    outline: none;
    background: #fff;
    transition: border-color 0.2s;
  }
  .add-input:focus { border-color: #3d5a80; }

  .add-btn {
    height: 42px; padding: 0 20px;
    background: linear-gradient(135deg, #2c3e50, #3d5a80);
    color: #fff; border: none; border-radius: 10px;
    font-size: 13px; font-family: sans-serif; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .add-btn:active { transform: none; }

  .add-hint { font-family: sans-serif; font-size: 11px; color: #bbb; margin-top: 8px; }

  /* FOOTER */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 36px; background: #faf7f3; border-top: 1px solid #ede8e0;
  }
  .footer-label { font-family: sans-serif; font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .footer-counts { font-family: sans-serif; font-size: 14px; font-weight: 600; margin-top: 2px; }
  .footer-counts .fm { color: #3d5a80; }
  .footer-counts .sep { color: #ccc; margin: 0 8px; }
  .footer-counts .fp { color: #e07b39; }
  .footer-heart { font-size: 22px; }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="header-top">
      <div class="compass">🧭</div>
      <div>
        <div class="title">Things to Do Before Dying</div>
        <div class="subtitle">A life well-lived</div>
      </div>
    </div>
    <div class="progress-row">
      <span class="progress-label m">M</span>
      <div class="progress-track"><div class="progress-fill m" id="bar-m"></div></div>
      <span class="progress-count m" id="count-m"></span>
    </div>
    <div class="progress-row">
      <span class="progress-label p">P</span>
      <div class="progress-track"><div class="progress-fill p" id="bar-p"></div></div>
      <span class="progress-count p" id="count-p"></span>
    </div>
  </div>

  <div class="col-headers">
    <div class="spacer"></div>
    <div class="col-head m">M</div>
    <div class="col-head p">P</div>
    <div class="col-head del"></div>
  </div>

  <div id="list"></div>

  <div class="add-section">
    <div class="add-row">
      <div class="emoji-picker-wrap">
        <div class="emoji-btn" id="emoji-btn" onclick="toggleEmojiPicker()">⭐</div>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
      <input class="add-input" id="new-label" type="text" placeholder="Add a new adventure…"
             onkeydown="if(event.key==='Enter') addItem()" maxlength="80" />
      <button class="add-btn" onclick="addItem()">+ Add</button>
    </div>
    <div class="add-hint">Pick an emoji, type your adventure, press Enter or click Add. Everything saves automatically.</div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-label">Adventures completed</div>
      <div class="footer-counts">
        <span class="fm" id="footer-m"></span>
        <span class="sep">·</span>
        <span class="fp" id="footer-p"></span>
      </div>
    </div>
    <div class="footer-heart">♥</div>
  </div>

</div>

<script>
const DEFAULT_ITEMS = [
  { label: "Sky diving",                           icon: "🪂", m: false, p: false },
  { label: "Bungee jumping",                       icon: "🎯", m: false, p: false },
  { label: "Diving",                               icon: "🤿", m: false, p: true  },
  { label: "Go to another country in Asia",        icon: "🏯", m: true,  p: true  },
  { label: "Go to a country in Europe",            icon: "🗼", m: false, p: false },
  { label: "Go to a country in Africa",            icon: "🦁", m: false, p: false },
  { label: "Go to a country in North America",     icon: "🗽", m: false, p: false },
  { label: "Go to a country in South America",     icon: "🌿", m: false, p: false },
  { label: "Go to Antarctica",                     icon: "🐧", m: false, p: false },
  { label: "Go to a country in Australia",         icon: "🦘", m: true,  p: false },
  { label: "Learn to dance (waltz / slow dance)",  icon: "💃", m: false, p: false },
  { label: "Go on a cruise",                       icon: "🚢", m: false, p: false },
  { label: "Skiing",                               icon: "⛷️", m: false, p: false },
  { label: "Learn how to surf",                    icon: "🏄", m: false, p: false },
];

const EMOJIS = [
  "🌍","✈️","🏔️","🌊","🎭","🎨","🍜","🎵","📚","🏕️",
  "🚴","🧗","🌅","🎪","🎠","🎡","🎢","🏖️","🌋","🗺️",
  "🦋","🐬","🦁","🐘","🦒","🌺","🌸","🍣","🍷","🎂",
  "🎸","🎹","🎤","🎬","🏆","🥇","💎","🚀","🌠","⭐",
  "🤿","🪂","⛷️","🏄","🚢","🏯","🗼","🐧","🦘","💃",
  "🎯","🧭","🌌","🎈","🏡","🌻","🦅","🎻","🍕","🏋️"
];

const KEY = "bucket_list_v2";

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return DEFAULT_ITEMS.map((item, i) => ({ ...item, id: i + 1 }));
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

let state = load();
let selectedEmoji = "⭐";
let nextId = state.length ? Math.max(...state.map(i => i.id)) + 1 : 1;

// ── Emoji picker ──────────────────────────────────────────────
(function buildPicker() {
  const grid = document.getElementById("emoji-grid");
  grid.innerHTML = EMOJIS.map(e =>
    `<span class="emoji-opt" onclick="selectEmoji('${e}')">${e}</span>`
  ).join("");
})();

function toggleEmojiPicker() {
  document.getElementById("emoji-grid").classList.toggle("open");
}
function selectEmoji(e) {
  selectedEmoji = e;
  document.getElementById("emoji-btn").textContent = e;
  document.getElementById("emoji-grid").classList.remove("open");
}
document.addEventListener("click", function(ev) {
  if (!document.querySelector(".emoji-picker-wrap").contains(ev.target))
    document.getElementById("emoji-grid").classList.remove("open");
});

// ── Actions ───────────────────────────────────────────────────
function addItem() {
  const input = document.getElementById("new-label");
  const label = input.value.trim();
  if (!label) { input.focus(); return; }
  state.push({ id: nextId++, label, icon: selectedEmoji, m: false, p: false });
  input.value = "";
  save();
  render();
}

function toggle(id, person) {
  state = state.map(i => i.id === id ? { ...i, [person]: !i[person] } : i);
  save();
  render();
}

function deleteItem(id) {
  if (!confirm("Remove this adventure?")) return;
  state = state.filter(i => i.id !== id);
  save();
  render();
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const total = state.length;
  const mDone = state.filter(i => i.m).length;
  const pDone = state.filter(i => i.p).length;

  document.getElementById("bar-m").style.width = total ? `${(mDone/total)*100}%` : "0%";
  document.getElementById("bar-p").style.width = total ? `${(pDone/total)*100}%` : "0%";
  document.getElementById("count-m").textContent = `${mDone}/${total}`;
  document.getElementById("count-p").textContent = `${pDone}/${total}`;
  document.getElementById("footer-m").textContent = `${mDone} M`;
  document.getElementById("footer-p").textContent = `${pDone} P`;

  document.getElementById("list").innerHTML = state.map(item => `
    <div class="item ${item.m && item.p ? 'both-done' : ''}">
      <div class="item-icon">${item.icon}</div>
      <div class="item-label">${esc(item.label)}</div>
      <div class="check-col">
        <div class="checkbox m-box ${item.m ? 'checked' : ''}" onclick="toggle(${item.id},'m')">${item.m ? "✓" : ""}</div>
      </div>
      <div class="check-col">
        <div class="checkbox p-box ${item.p ? 'checked' : ''}" onclick="toggle(${item.id},'p')">${item.p ? "✓" : ""}</div>
      </div>
      <div class="del-col">
        <button class="del-btn" onclick="deleteItem(${item.id})" title="Remove">×</button>
      </div>
    </div>
  `).join("");
}

render();
</script>
</body>
</html>
